# Parallel build
BB_NUMBER_THREADS = "8"
PARALLEL_MAKE = "-j 8"

# shared cache
SSTATE_DIR  = "${TOPDIR}/../sstate-cache"
DL_DIR = "${TOPDIR}/../downloads"

#PAckaging 
PACKAGE_CLASSES = "package_ipk"


# remove intermidiate files
INHERIT += "rm_work"

#communications 
ENABLE_UART = "1"

#enables ssh

#enable users
INHERIT += "extrausers"
EXTRA_USERS_PARAMS += "\
	usermod -p '\$6\$08B9PORTFrVYuY/9\$y/cnuU4dIy0RdLsChGLj/0uAQweNDrWCX2waCN33V93Um/OrXWIykvoMnIZj7EQHe8EJDJ4mgJ5nZb1k2UHCp1' root; \
	useradd -p '\$6\$vOvzCD3t0xAM7j5u\$gzUkRQyYBR2qnTRGeo6ba9E00hjiRekI33QiihrErsGTPESYweDrAnvbbbJKSUrbWRUeYe9erHj5aLe4nDoa/' mark; \
"
# disable flags
INIT_MANAGER = "systemd"

LICENSE_FLAGS_ACCEPTED = "synaptics-killswitch"

# connman 
IMAGE_INSTALL:append = " connman connman-client"



IMAGE_INSTALL:append = " python3 python3-pip"
IMAGE_INSTALL:append = " python3-requests"

IMAGE_INSTALL:append =  " hello-python"
IMAGE_INSTALL:append = " unblock-wifi"
IMAGE_INSTALL:append = " hello-c"


